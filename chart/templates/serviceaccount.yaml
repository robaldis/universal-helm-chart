{{- $namespace := .Release.Namespace -}}
{{- range $key, $value := .Values.deployments }}
{{- if and (eq $value.type "deployment") $value.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $value.serviceAccount.name | default $key | quote }}
  namespace: {{ $namespace }}
  {{- if $value.serviceAccount.annotations }}
  annotations:
    {{- toYaml $value.serviceAccount.annotations | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- end }}
