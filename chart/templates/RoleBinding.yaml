{{- $namespace := .Release.Namespace -}}
{{- range $key, $value := .Values.deployments }}
{{- if $value.roles }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $key }}
  namespace: {{ $namespace }}
subjects:
- kind: ServiceAccount
  name: {{ $key }}
  namespace: {{ $namespace }}
roleRef:
  kind: ClusterRole
  name: {{ $key }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
